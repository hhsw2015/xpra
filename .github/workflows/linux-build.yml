name: Linux x86_64 Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['xpra/**', 'setup.py']

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependencies (all pkg-config deps from setup.py)
        run: |
          sudo apt-get update
          # Core (must succeed)
          sudo apt-get install -y -qq \
            python3-dev python-gi-dev python3-cairo-dev pandoc pkg-config \
            libgtk-3-dev libglib2.0-dev libcairo2-dev \
            libx11-dev libxtst-dev libxcomposite-dev libxdamage-dev \
            libxres-dev libxkbfile-dev libxfixes-dev libxrandr-dev libxext-dev \
            libxcursor-dev libxi-dev \
            libdrm-dev libpixman-1-dev \
            libsystemd-dev liblz4-dev libpam0g-dev \
            libturbojpeg0-dev libwebp-dev \
            libxxhash-dev libbrotli-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-pulseaudio \
            python3-gi python3-cairo python3-pil python3-numpy python3-opengl \
            xvfb xauth
          # Optional (may not exist on all distros)
          sudo apt-get install -y -qq \
            libx264-dev libvpx-dev libqrencode-dev \
            libopenh264-dev libavif-dev libprocps-dev \
            libxpresent-dev || true
          # Verify critical pkg-config
          pkg-config --libs libxxhash && echo "xxhash: OK"
          pkg-config --libs gdk-3.0 && echo "gtk: OK"
          pkg-config --libs pygobject-3.0 && echo "pygobject: OK"
          pip install setuptools cython pynvml

      - name: Build Cython extensions
        run: |
          python setup.py build_ext --inplace 2>&1 | tee /tmp/build.log | tail -50
          SO_COUNT=$(find xpra -name "*.cpython-3*-linux-gnu.so" | wc -l)
          echo "=== Built .so files: $SO_COUNT ==="
          find xpra -name "*.cpython-3*-linux-gnu.so" | sort
          if [[ $SO_COUNT -lt 10 ]]; then
            echo "ERROR: too few .so files ($SO_COUNT), build failed"
            cat /tmp/build.log
            exit 1
          fi

      - name: Get version info
        id: version
        run: |
          VER=$(python -c "from xpra import __version__; print(__version__)" 2>/dev/null || echo "6.5")
          REV=$(git rev-parse --short HEAD)
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "rev=$REV" >> $GITHUB_OUTPUT
          echo "Version: $VER ($REV)"

      - name: Build .deb package
        run: |
          VER=${{ steps.version.outputs.ver }}
          REV=${{ steps.version.outputs.rev }}
          PKG="xpra-server-custom_${VER}-${REV}_amd64"
          ROOT="dist/$PKG"

          # Python modules → /usr/lib/python3/dist-packages/xpra
          DEST="$ROOT/usr/lib/python3/dist-packages"
          mkdir -p "$DEST"
          # Copy .py
          find xpra -name "*.py" | while read f; do
            mkdir -p "$DEST/$(dirname $f)"
            cp "$f" "$DEST/$f"
          done
          # Copy .so
          find xpra -name "*.so" | while read f; do
            mkdir -p "$DEST/$(dirname $f)"
            cp "$f" "$DEST/$f"
          done

          # Config → /etc/xpra
          mkdir -p "$ROOT/etc"
          cp -r fs/etc/xpra "$ROOT/etc/" 2>/dev/null || true

          # Bin → /usr/bin/xpra (wrapper)
          mkdir -p "$ROOT/usr/bin"
          cat > "$ROOT/usr/bin/xpra" << 'XPRABIN'
          #!/usr/bin/python3
          import sys
          from xpra.scripts.main import main
          sys.exit(main())
          XPRABIN
          chmod +x "$ROOT/usr/bin/xpra"

          # Systemd / helpers
          mkdir -p "$ROOT/usr/libexec/xpra"
          cp -r fs/lib/systemd "$ROOT/usr/lib/systemd" 2>/dev/null || true

          # DEBIAN control
          mkdir -p "$ROOT/DEBIAN"
          SO_COUNT=$(find "$DEST/xpra" -name "*.so" | wc -l)
          cat > "$ROOT/DEBIAN/control" << EOF
          Package: xpra-server-custom
          Version: ${VER}-${REV}
          Architecture: amd64
          Maintainer: local <local@local>
          Description: Xpra server ${VER} (custom build from source, ${SO_COUNT} .so modules)
           Built from commit ${REV}. Drop-in replacement for apt xpra packages.
          Depends: python3, python3-gi, python3-cairo, gstreamer1.0-plugins-good, gstreamer1.0-pulseaudio, xvfb
          Conflicts: xpra-server, xpra-common, xpra-x11
          Replaces: xpra-server, xpra-common, xpra-x11
          EOF
          # Remove leading spaces from control (heredoc artifact)
          sed -i 's/^          //' "$ROOT/DEBIAN/control"
          sed -i 's/^          //' "$ROOT/usr/bin/xpra"

          # Build .deb
          dpkg-deb --build "$ROOT"
          # deb is already at dist/${PKG}.deb
          echo "=== Package ==="
          ls -lh "dist/${PKG}.deb"
          dpkg-deb -I "dist/${PKG}.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: xpra-linux-x86_64-server
          path: dist/*.deb
          retention-days: 30
